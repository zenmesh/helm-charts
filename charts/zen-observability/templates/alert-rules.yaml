{{- if .Values.alertRules.enabled }}
{{- $namespace := include "zen-observability.namespace" . }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "zen-observability.fullname" . }}-alerts
  namespace: {{ $namespace }}
  labels:
    {{- include "zen-observability.labels" . | nindent 4 }}
    {{- with .Values.alertRules.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    # Platform Availability Alerts
    - name: platform_availability
      interval: 30s
      rules:
        - alert: PlatformServiceDown
          expr: up{job=~"zen-(back|bff|websocket|watcher|flow|gc|lock|lead)"} == 0
          for: 5m
          labels:
            severity: critical
            component: availability
          annotations:
            summary: "Platform service {{ $labels.job }} is down"
            description: "Service {{ $labels.job }} has been down for more than 5 minutes."
        
        - alert: PlatformServiceUnhealthy
          expr: |
            (
              up{job=~"zen-(back|bff|websocket|watcher|flow|gc|lock|lead)"} == 1
              and
              on(job) health_check_status{status="unhealthy"} == 1
            )
          for: 2m
          labels:
            severity: warning
            component: availability
          annotations:
            summary: "Platform service {{ $labels.job }} is unhealthy"
            description: "Service {{ $labels.job }} is running but health checks are failing."

    # HTTP Service Metrics
    - name: http_services
      interval: 30s
      rules:
        - alert: HighHTTPErrorRate
          expr: |
            (
              sum(rate(zen_http_requests_total{status=~"5.."}[5m])) by (component, endpoint)
              /
              sum(rate(zen_http_requests_total[5m])) by (component, endpoint)
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            component: http
          annotations:
            summary: "High HTTP error rate for {{ $labels.component }}"
            description: "Error rate is {{ $value | humanizePercentage }} for endpoint {{ $labels.endpoint }}"
        
        - alert: CriticalHTTPErrorRate
          expr: |
            (
              sum(rate(zen_http_requests_total{status=~"5.."}[5m])) by (component, endpoint)
              /
              sum(rate(zen_http_requests_total[5m])) by (component, endpoint)
            ) > 0.10
          for: 2m
          labels:
            severity: critical
            component: http
          annotations:
            summary: "Critical HTTP error rate for {{ $labels.component }}"
            description: "Error rate is {{ $value | humanizePercentage }} for endpoint {{ $labels.endpoint }}"
        
        - alert: HighHTTPLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(zen_http_request_duration_seconds_bucket[5m])) by (component, endpoint, le)
            ) > 1.0
          for: 10m
          labels:
            severity: warning
            component: http
          annotations:
            summary: "High HTTP latency for {{ $labels.component }}"
            description: "P95 latency is {{ $value }}s for endpoint {{ $labels.endpoint }}"

    # Controller Reconciliation Metrics
    - name: controller_reconciliation
      interval: 30s
      rules:
        - alert: HighReconciliationErrorRate
          expr: |
            (
              sum(rate(zen_reconciliations_total{result="error"}[5m])) by (component)
              /
              sum(rate(zen_reconciliations_total[5m])) by (component)
            ) > 0.10
          for: 5m
          labels:
            severity: warning
            component: controller
          annotations:
            summary: "High reconciliation error rate for {{ $labels.component }}"
            description: "Error rate is {{ $value | humanizePercentage }}"
        
        - alert: SlowReconciliation
          expr: |
            histogram_quantile(0.95,
              sum(rate(zen_reconciliation_duration_seconds_bucket[5m])) by (component, le)
            ) > 30
          for: 10m
          labels:
            severity: warning
            component: controller
          annotations:
            summary: "Slow reconciliation for {{ $labels.component }}"
            description: "P95 reconciliation duration is {{ $value }}s"

    # Path/Delivery Flow Metrics
    - name: delivery_flows
      interval: 30s
      rules:
        - alert: DeliveryFlowFailureRateHigh
          expr: |
            (
              sum(rate(zen_delivery_flow_deliveries_total{status="failed"}[5m])) by (flow_name, tenant_id)
              /
              sum(rate(zen_delivery_flow_deliveries_total[5m])) by (flow_name, tenant_id)
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            component: delivery_flow
          annotations:
            summary: "High delivery failure rate for flow {{ $labels.flow_name }}"
            description: "Failure rate is {{ $value | humanizePercentage }} for tenant {{ $labels.tenant_id }}"
        
        - alert: DeliveryFlowLatencyHigh
          expr: |
            histogram_quantile(0.95,
              sum(rate(zen_delivery_flow_latency_seconds_bucket[5m])) by (flow_name, le)
            ) > 5.0
          for: 10m
          labels:
            severity: warning
            component: delivery_flow
          annotations:
            summary: "High delivery latency for flow {{ $labels.flow_name }}"
            description: "P95 latency is {{ $value }}s"

    # Ingester Metrics
    - name: ingesters
      interval: 30s
      rules:
        - alert: IngesterDown
          expr: up{job="zen-watcher",component="ingester"} == 0
          for: 5m
          labels:
            severity: critical
            component: ingester
          annotations:
            summary: "Ingester {{ $labels.name }} is down"
            description: "Ingester has been down for more than 5 minutes"
        
        - alert: IngesterHighErrorRate
          expr: |
            sum(rate(zen_watcher_ingester_errors_total[5m])) by (ingester_name) > 10
          for: 5m
          labels:
            severity: warning
            component: ingester
          annotations:
            summary: "High error rate for ingester {{ $labels.ingester_name }}"
            description: "Error rate is {{ $value }} errors/sec"

    # Database Metrics
    - name: database
      interval: 30s
      rules:
        - alert: DatabaseSlowQueries
          expr: |
            histogram_quantile(0.95,
              sum(rate(zen_database_query_duration_seconds_bucket[5m])) by (operation, le)
            ) > 0.5
          for: 10m
          labels:
            severity: warning
            component: database
          annotations:
            summary: "Slow database queries detected"
            description: "P95 query latency is {{ $value }}s for operation {{ $labels.operation }}"
        
        - alert: DatabaseConnectionPoolExhausted
          expr: |
            (zen_database_connections_active / zen_database_connections_max) > 0.9
          for: 5m
          labels:
            severity: warning
            component: database
          annotations:
            summary: "Database connection pool nearly exhausted"
            description: "Pool usage is {{ $value | humanizePercentage }}"

    # Resource Usage
    - name: resource_usage
      interval: 1m
      rules:
        - alert: HighMemoryUsage
          expr: |
            (container_memory_usage_bytes{container!="POD",container!=""} / container_spec_memory_limit_bytes) > 0.9
          for: 10m
          labels:
            severity: warning
            component: resources
          annotations:
            summary: "High memory usage for {{ $labels.pod }}"
            description: "Memory usage is {{ $value | humanizePercentage }}"
        
        - alert: HighCPUUsage
          expr: |
            rate(container_cpu_usage_seconds_total{container!="POD",container!=""}[5m]) > 0.9
          for: 10m
          labels:
            severity: warning
            component: resources
          annotations:
            summary: "High CPU usage for {{ $labels.pod }}"
            description: "CPU usage is {{ $value | humanizePercentage }}"

    # VictoriaMetrics Self-Monitoring
    - name: victoriametrics
      interval: 30s
      rules:
        - alert: VictoriaMetricsDown
          expr: up{job="victoriametrics"} == 0
          for: 1m
          labels:
            severity: critical
            component: observability
          annotations:
            summary: "VictoriaMetrics is down"
            description: "VictoriaMetrics instance is not responding"
        
        - alert: VictoriaMetricsHighIngestionRate
          expr: |
            rate(vm_rows_per_second[5m]) > 1000000
          for: 5m
          labels:
            severity: warning
            component: observability
          annotations:
            summary: "High metrics ingestion rate"
            description: "Ingestion rate is {{ $value }} rows/sec"
        
        - alert: VictoriaMetricsHighMemoryUsage
          expr: |
            (vm_memory_usage_bytes / vm_memory_limit_bytes) > 0.9
          for: 10m
          labels:
            severity: warning
            component: observability
          annotations:
            summary: "High VictoriaMetrics memory usage"
            description: "Memory usage is {{ $value | humanizePercentage }}"
{{- end }}
