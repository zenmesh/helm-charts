# Production Values for Zen Observability Stack
# Use with: helm install ... --values values-production.yaml

global:
  namespace: zen-monitoring

# VictoriaMetrics Production Configuration
victoriametrics:
  enabled: true
  cluster:
    enabled: true
    replicas: 3  # HA deployment
    retentionPeriod: "24"  # 24 months
    storage:
      size: 200Gi  # Adjust based on retention and metrics volume
      storageClass: ""  # Use default or specify
    resources:
      requests:
        memory: "4Gi"
        cpu: "2000m"
      limits:
        memory: "8Gi"
        cpu: "4000m"

# Grafana Production Configuration
grafana:
  enabled: true
  adminPassword: ""  # MUST be set via secret in production
  
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  
  # Enable ingress for production
  ingress:
    enabled: true
    className: nginx  # Adjust based on your ingress controller
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: grafana.example.com  # Change to your domain
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.example.com  # Change to your domain

# Alert Rules
alertRules:
  enabled: true

# Service Monitors
serviceMonitors:
  enabled: true

# Pod Monitors
podMonitors:
  enabled: true

# Resource limits (production)
resources:
  victoriametrics:
    requests:
      memory: "4Gi"
      cpu: "2000m"
    limits:
      memory: "8Gi"
      cpu: "4000m"
  
  grafana:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# Node selector (optional)
nodeSelector:
  kubernetes.io/os: linux

# Tolerations (optional)
tolerations: []

# Affinity (optional - spread across nodes for HA)
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - victoria-metrics-k8s-stack
          topologyKey: kubernetes.io/hostname
