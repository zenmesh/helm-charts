# Zen Platform Observability Stack
# VictoriaMetrics + Grafana with pre-configured dashboards and alerts

global:
  namespace: zen-monitoring

# VictoriaMetrics Configuration
victoriametrics:
  enabled: true
  
  # Use VictoriaMetrics K8s Stack chart
  operator:
    enabled: true
    image:
      repository: victoriametrics/operator
      tag: v0.37.0
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"
  
  # VictoriaMetrics Cluster
  cluster:
    enabled: true
    replicas: 1
    retentionPeriod: "12"  # months
    storage:
      storageClass: ""  # Use default storage class
      size: 50Gi
    resources:
      requests:
        memory: "2Gi"
        cpu: "1000m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
    
    # Scrape configuration
    scrapeInterval: 30s
    scrapeTimeout: 10s
    
    # ServiceMonitor discovery
    serviceMonitorSelector: {}
    podMonitorSelector: {}
    probeSelector: {}
    staticScrapeSelector: {}
    
    # Remote write (optional)
    remoteWrite: []
    
    # Retention
    retentionPeriod: "12"  # months
    
    # Persistence
    persistentVolume:
      enabled: true
      size: 50Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce

# Grafana Configuration
grafana:
  enabled: true
  
  image:
    repository: grafana/grafana
    tag: "10.2.3"
  
  adminUser: admin
  adminPassword: ""  # Set via secret or external secret manager
  
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  # Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  
  # Ingress (optional)
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: grafana.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  
  # Datasource provisioning
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: VictoriaMetrics
          type: prometheus
          access: proxy
          url: http://vmsingle-zen-observability-victoria-metrics-k8s-stack:8429
          isDefault: true
          editable: true
          jsonData:
            timeInterval: "30s"
  
  # Dashboard provisioning
  dashboards:
    default:
      zen-platform-overview:
        gnetId: 0
        revision: 0
        datasource: VictoriaMetrics
      zen-platform-services:
        gnetId: 0
        revision: 0
        datasource: VictoriaMetrics
  
  # Sidecar for dashboard auto-discovery
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /tmp/dashboards
      provider:
        foldersFromFilesStructure: true
  
  # Plugins
  plugins: []
  
  # Security
  security:
    adminUser: admin
    adminPassword: ""  # Set via secret

# Alert Rules (VictoriaMetrics Operator)
alertRules:
  enabled: true
  
  # Namespace for alert rules
  namespace: zen-monitoring
  
  # Labels for alert rule discovery
  labels:
    app: zen-observability
    component: alertrules

# Service Monitors (for auto-discovery)
serviceMonitors:
  enabled: true
  
  # Labels for service monitor discovery
  labels:
    app: zen-observability
    component: servicemonitor

# Pod Monitors (for auto-discovery)
podMonitors:
  enabled: true
  
  # Labels for pod monitor discovery
  labels:
    app: zen-observability
    component: podmonitor

# Resource limits
resources:
  victoriametrics:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  
  grafana:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Node selector (optional)
nodeSelector: {}

# Tolerations (optional)
tolerations: []

# Affinity (optional)
affinity: {}
