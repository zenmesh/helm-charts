# Default values for zen-watcher
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: kubezen/zen-watcher
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8080

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Node selector, tolerations and affinity
nodeSelector: {}

tolerations: []

affinity: {}

# Leader election configuration (Profiles B/C)
leaderElection:
  mode: builtin        # builtin | zenlead | disabled
  electionID: ""       # default to "zen-watcher-leader-election" if empty
  leaseName: ""        # required if mode=zenlead

# Pod Disruption Budget
pdb:
  enabled: true
  minAvailable: 1

# Topology spread constraints
topologySpreadConstraints: []


# CRDs configuration
crds:
  # Controls whether CRDs are installed with this chart
  # Set to false if CRDs are managed separately (e.g., via ArgoCD, Flux, or manual install)
  enabled: false
