{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "zen-watcher.fullname" . }}
  namespace: {{ include "zen-watcher.namespace" . }}
  labels:
    {{- include "zen-watcher.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "zen-watcher.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- if .Values.networkPolicy.ingress.enabled }}
    - Ingress
    {{- end }}
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  {{- if .Values.networkPolicy.ingress.enabled }}
  ingress:
    {{- range .Values.networkPolicy.ingress.from }}
    - from:
        {{- if .namespaceSelector }}
        - namespaceSelector:
            {{- toYaml .namespaceSelector | nindent 12 }}
        {{- end }}
        {{- if .podSelector }}
        - podSelector:
            {{- toYaml .podSelector | nindent 12 }}
        {{- end }}
        {{- if .ipBlock }}
        - ipBlock:
            {{- toYaml .ipBlock | nindent 12 }}
        {{- end }}
      ports:
        {{- range .ports }}
        - protocol: {{ .protocol | default "TCP" }}
          port: {{ .port }}
        {{- end }}
    {{- end }}
    {{- if .Values.networkPolicy.ingress.allowMetrics }}
    # Allow Prometheus/VictoriaMetrics scraping
    - from:
        {{- if .Values.networkPolicy.ingress.metricsNamespaces }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingress.metricsNamespaces | nindent 14 }}
        {{- else }}
        # Default: allow from monitoring namespace (common Prometheus location)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- end }}
  {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    {{- if .Values.networkPolicy.egress.allowDNS }}
    # Allow DNS queries
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    {{- end }}
    {{- if .Values.networkPolicy.egress.allowKubernetesAPI }}
    {{- $hasServiceIP := and .Values.networkPolicy.egress.kubernetesServiceIP (ne .Values.networkPolicy.egress.kubernetesServiceIP "") }}
    {{- $hasCIDRs := and .Values.networkPolicy.egress.kubernetesAPICIDRs (gt (len .Values.networkPolicy.egress.kubernetesAPICIDRs) 0) }}
    {{- if not (or $hasServiceIP $hasCIDRs) }}
    {{- fail "NetworkPolicy egress.allowKubernetesAPI=true requires at least one of: egress.kubernetesServiceIP or egress.kubernetesAPICIDRs. Set kubernetesServiceIP (for on-prem) or kubernetesAPICIDRs (for managed control planes)." }}
    {{- end }}
    # Allow Kubernetes API access (required for informers and CRD operations)
    # Explicit destinations required - no broad defaults to prevent silent failures
    {{- if $hasServiceIP }}
    # Kubernetes API service IP (on-prem clusters)
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.egress.kubernetesServiceIP }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- if $hasCIDRs }}
    # Kubernetes API server CIDR blocks (managed control planes: EKS/GKE/AKS)
    {{- range .Values.networkPolicy.egress.kubernetesAPICIDRs }}
    - to:
        - ipBlock:
            cidr: {{ . }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- end }}
    {{- end }}
    {{- range .Values.networkPolicy.egress.to }}
    - to:
        {{- if .namespaceSelector }}
        - namespaceSelector:
            {{- toYaml .namespaceSelector | nindent 12 }}
        {{- end }}
        {{- if .podSelector }}
        - podSelector:
            {{- toYaml .podSelector | nindent 12 }}
        {{- end }}
        {{- if .ipBlock }}
        - ipBlock:
            {{- toYaml .ipBlock | nindent 12 }}
        {{- end }}
      ports:
        {{- range .ports }}
        - protocol: {{ .protocol | default "TCP" }}
          port: {{ .port }}
        {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
