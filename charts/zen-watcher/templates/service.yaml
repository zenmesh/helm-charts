apiVersion: v1
kind: Service
metadata:
  name: {{ include "zen-watcher.fullname" . }}-metrics
  namespace: {{ include "zen-watcher.namespace" . }}
  labels:
    {{- include "zen-watcher.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "zen-watcher.selectorLabels" . | nindent 4 }}

