{{- if .Values.privateKey.createPlaceholder }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.privateKey.secretName }}
  namespace: {{ include "zen-lock.namespace" . }}
  labels:
    {{- include "zen-lock.labels" . | nindent 4 }}
  annotations:
    # Enable Helm adoption of pre-existing secrets
    # When bootstrap creates this secret before Helm install, these annotations
    # allow Helm to adopt it without ownership conflicts
    meta.helm.sh/release-name: {{ $.Release.Name }}
    meta.helm.sh/release-namespace: {{ $.Release.Namespace }}
type: Opaque
stringData:
  {{ .Values.privateKey.secretKey }}: |
    PLACEHOLDER_REPLACE_WITH_ACTUAL_KEY
{{- end }}

---
# Pre-install hook to adopt existing master key secret
# This runs before the main release and adds Helm labels to pre-existing secrets
# allowing subsequent upgrades to succeed without ownership errors
{{- if not .Values.privateKey.createPlaceholder }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "zen-lock.fullname" . }}-adopt-master-key
  namespace: {{ include "zen-lock.namespace" . }}
  labels:
    {{- include "zen-lock.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret-adoption
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      labels:
        {{- include "zen-lock.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: secret-adoption
    spec:
      serviceAccountName: {{ include "zen-lock.webhookServiceAccountName" . }}
      restartPolicy: OnFailure
      containers:
        - name: adopt-secret
          image: bitnami/kubectl:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            runAsUser: 65534
          command:
            - /bin/sh
            - -c
            - |
              set -e
              SECRET_NAME="{{ .Values.privateKey.secretName }}"
              NAMESPACE="{{ include "zen-lock.namespace" . }}"
              RELEASE_NAME="{{ $.Release.Name }}"
              RELEASE_NAMESPACE="{{ $.Release.Namespace }}"
              
              # Check if secret exists
              if kubectl get secret "${SECRET_NAME}" -n "${NAMESPACE}" >/dev/null 2>&1; then
                echo "Secret ${SECRET_NAME} exists, adopting for Helm..."
                
                # Add Helm ownership labels and annotations
                kubectl label secret "${SECRET_NAME}" -n "${NAMESPACE}" \
                  "app.kubernetes.io/managed-by=Helm" \
                  "app.kubernetes.io/name={{ include "zen-lock.name" . }}" \
                  "app.kubernetes.io/instance=${RELEASE_NAME}" \
                  --overwrite
                
                kubectl annotate secret "${SECRET_NAME}" -n "${NAMESPACE}" \
                  "meta.helm.sh/release-name=${RELEASE_NAME}" \
                  "meta.helm.sh/release-namespace=${RELEASE_NAMESPACE}" \
                  --overwrite
                
                echo "Secret adopted successfully"
              else
                echo "Secret ${SECRET_NAME} does not exist, skipping adoption"
              fi
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
{{- end }}
