{{- if and .Values.webhook.enabled (eq (include "zen-lock.webhookTLSMode" .) "self-signed") }}
---
# P1.4: Self-signed certificate generation Job
# This Job generates a CA and serving certificate, creates the TLS secret,
# and patches the MutatingWebhookConfiguration with the CA bundle.
# Uses kube-webhook-certgen which is purpose-built for this task.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "zen-lock.fullname" . }}-webhook-cert-setup
  namespace: {{ include "zen-lock.namespace" . }}
  labels:
    {{- include "zen-lock.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook-cert-setup
  annotations:
    # H130-FIX: Run as pre-install to ensure cert exists before webhook pod mounts it
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "zen-lock.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: webhook-cert-setup
    spec:
      serviceAccountName: {{ include "zen-lock.controllerServiceAccountName" . }}
      restartPolicy: OnFailure
      containers:
        - name: create
          image: registry.k8s.io/ingress-nginx/kube-webhook-certgen:v1.4.4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            runAsUser: 65534
          args:
            - create
            - --host={{ include "zen-lock.fullname" . }}-webhook,{{ include "zen-lock.fullname" . }}-webhook.{{ include "zen-lock.namespace" . }}.svc,{{ include "zen-lock.fullname" . }}-webhook.{{ include "zen-lock.namespace" . }}.svc.cluster.local
            - --namespace={{ include "zen-lock.namespace" . }}
            - --secret-name={{ .Values.webhook.certSecret }}
            - --cert-name=tls.crt
            - --key-name=tls.key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: patch
          image: registry.k8s.io/ingress-nginx/kube-webhook-certgen:v1.4.4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            runAsUser: 65534
          args:
            - patch
            - --webhook-name={{ include "zen-lock.fullname" . }}-mutating-webhook
            - --namespace={{ include "zen-lock.namespace" . }}
            - --secret-name={{ .Values.webhook.certSecret }}
            - --patch-mutating=true
            - --patch-validating=false
            - --patch-failure-policy=Fail
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
{{- end }}
