# Default values for zen-lock
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: kubezen/zen-lock
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.0.3-alpha-zb1fix1"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""


# Controller configuration
controller:
  # Enable the controller component
  enabled: true
  # Number of controller replicas (defaults to replicaCount if not set)
  replicaCount: 2
  # Leader election configuration (Profiles B/C)
  leaderElection:
    mode: builtin        # builtin | zenlead | disabled
    electionID: ""       # default to "zen-lock-controller-leader-election" if empty
    leaseName: ""       # required if mode=zenlead
  serviceAccount:
    create: true
    name: ""
    annotations: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 8080
  webhookPort: 443
  targetPort: 8080
  webhookTargetPort: 9443

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Webhook configuration
webhook:
  enabled: true
  replicaCount: 2  # Webhooks scale horizontally (no leader election)
  port: 9443
  certDir: /tmp/k8s-webhook-server/serving-certs
  # Certificate secret name (managed by cert-manager, self-signed job, or user-provided)
  certSecret: zen-lock-webhook-cert
  # TLS certificate management mode
  # Defaults: cert-manager if certManager.enabled=true, otherwise self-signed
  # Options:
  #   - cert-manager: Use cert-manager to issue and manage certificates (recommended for production)
  #   - self-signed: Generate self-signed certificates via a Job (zero-dependency, for development/testing)
  #   - provided: User provides the TLS secret and caBundle (for advanced use cases)
  tls:
    mode: ""  # cert-manager | self-signed | provided (auto-detected if empty: cert-manager if certManager.enabled=true, else self-signed)
    # caBundle: required when mode=provided, base64-encoded CA certificate
    # caBundle: ""
  # Use cert-manager to manage certificates (required when tls.mode=cert-manager)
  certManager:
    enabled: false
    issuer:
      name: ""  # Required: name of ClusterIssuer or Issuer
      kind: ClusterIssuer  # ClusterIssuer or Issuer
    # Certificate duration (default: issuer default, typically 90d for Let's Encrypt)
    duration: ""
    # Renew certificate before expiration (default: 240h = 10 days)
    renewBefore: "240h"
    # Private key rotation policy (default: Always for better security)
    rotationPolicy: Always
    # Optional: Override DNS names (defaults to service DNS names)
    dnsNames: []
    #   - "custom-webhook.example.com"
  # Self-signed certificate configuration (used when tls.mode=self-signed)
  selfSigned:
    # Certificate validity duration (default: 365d)
    duration: "365d"
    # CA certificate validity duration (default: 10y)
    caDuration: "87600h"  # 10 years
  # Webhook timeout in seconds (default: 10)
  timeoutSeconds: 10
  # Webhook failure policy: Fail or Ignore (default: Fail)
  # Fail: Reject the request if webhook fails (recommended for security)
  # Ignore: Allow the request to proceed if webhook fails (not recommended)
  failurePolicy: Fail

# Private key configuration
# IMPORTANT: The private key must be provided via a Kubernetes Secret
# The secret must contain the key specified in privateKey.secretKey
#
# WORKFLOW:
# 1. Generate key: zen-lock keygen --output private-key.age
# 2a. Option A (recommended): Pre-create secret, then set createPlaceholder=false
# 2b. Option B: Install with createPlaceholder=true, then immediately replace placeholder
# 3. Verify: kubectl get secret zen-lock-master-key -o jsonpath='{.data.key\.txt}' | base64 -d | head -c 20
#    Expected: AGE-SECRET-KEY-1... (NOT "PLACEHOLDER_REPLACE_WITH_ACTUAL_KEY")
#
# WARNING: If createPlaceholder=true and you forget to replace the placeholder,
# all Pods with zen-lock/inject annotations will fail with decryption errors.
#
privateKey:
  # Name of the secret containing the private key
  secretName: zen-lock-master-key
  # Key within the secret that contains the private key
  secretKey: key.txt
  # Create a placeholder secret (user must update it with actual key)
  # true: Chart creates a dummy secret; operator MUST replace with real key
  # false: Operator must pre-create the secret before installing the chart
  createPlaceholder: true

# Metrics configuration
metrics:
  enabled: true
  port: 8080
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Prometheus rules
prometheus:
  rules:
    enabled: false

# Grafana dashboard
grafana:
  dashboard:
    enabled: false

# CRD management
crd:
  # Install CRDs as part of Helm install
  install: true

# Namespace configuration
# H130-FIX: Default to false to avoid conflict with helmfile --create-namespace
# Set to true only when not using helmfile or when deploying standalone without --create-namespace
namespace:
  create: false
  name: zen-lock-system

# Additional environment variables
env: []
  # - name: CUSTOM_VAR
  #   value: "custom-value"

# Configuration environment variables
# These can be overridden via the env array above if needed
config:
  # Webhook timeout (default: 10s)
  # Format: Go duration string (e.g., "10s", "30s", "1m")
  webhookTimeout: "10s"
  
  # Cache TTL for ZenLock CRDs (default: 5m)
  # Format: Go duration string (e.g., "5m", "10m", "1h")
  cacheTTL: "5m"
  
  # Orphan TTL - time after which orphaned Secrets are deleted (default: 15m)
  # Format: Go duration string (e.g., "15m", "30m", "1h")
  orphanTTL: "15m"

# Additional volume mounts
extraVolumeMounts: []

# Additional volumes
extraVolumes: []

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

