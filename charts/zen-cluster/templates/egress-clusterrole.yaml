{{- if and .Values.egress.enabled .Values.egress.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zen-cluster.fullname" . }}-egress
  labels:
    {{- include "zen-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress
rules:
  {{- toYaml .Values.egress.rbac.rules | nindent 2 }}
{{- end }}

