{{- if .Values.bootstrap.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "zen-cluster.fullname" . }}-bootstrap
  namespace: {{ .Values.bootstrap.targetNamespace | default .Values.namespace }}
  labels:
    {{- include "zen-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames:
  - {{ .Values.bootstrap.enrollmentBundleSecretRef.name }}
  - {{ .Values.ingester.tenantID.secretName }}
  verbs: ["get"]
{{- end }}

