{{- if and .Values.agent.enabled (or (not .Values.agent.rbac.scope) (eq .Values.agent.rbac.scope "cluster")) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zen-cluster.fullname" . }}-agent
  labels:
    {{- include "zen-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zen-cluster.fullname" . }}-agent
subjects:
  - kind: ServiceAccount
    name: {{ include "zen-cluster.fullname" . }}-agent
    namespace: {{ .Values.namespace }}
{{- end }}

