{{- if .Values.ingester.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "zen-cluster.fullname" . }}-ingester
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "zen-cluster.labels" . | nindent 4 }}
    component: ingester
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "zen-cluster.fullname" . }}-ingester
subjects:
- kind: ServiceAccount
  name: {{ include "zen-cluster.fullname" . }}-ingester
  namespace: {{ .Values.namespace }}
{{- end }}

