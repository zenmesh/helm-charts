{{- if and .Values.agent.enabled .Values.agent.pdb.enabled (gt (int .Values.agent.replicaCount) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "zen-cluster.fullname" . }}-agent
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "zen-cluster.labels" . | nindent 4 }}
    component: agent
spec:
  {{- if .Values.agent.pdb.minAvailable }}
  minAvailable: {{ .Values.agent.pdb.minAvailable }}
  {{- else if .Values.agent.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.agent.pdb.maxUnavailable }}
  {{- else }}
  minAvailable: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include "zen-cluster.selectorLabels" . | nindent 6 }}
      component: agent
{{- end }}
