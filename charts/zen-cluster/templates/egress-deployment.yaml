{{- include "zen-cluster.validatePlane" . }}
{{- include "zen-cluster.commitmentValidations" . }}
{{- if .Values.egress.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zen-cluster.fullname" . }}-egress
  labels:
    {{- include "zen-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress
spec:
  {{- if not .Values.egress.autoscaling.enabled }}
  {{- if and .Values.egress.enabled .Values.egress.keda.enabled .Values.keda.enabled }}
  # KEDA will manage replicas - set initial count
  replicas: {{ .Values.egress.keda.minReplicas | default 1 }}
  {{- else }}
  replicas: {{ .Values.egress.replicaCount }}
  {{- end }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "zen-cluster.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: egress
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        {{- if .Values.egress.join.enabled }}
        # zen-lock injection annotations for Join authentication
        zen-lock/inject: "zen-join-zen-egress"
        zen-lock/mount-path: "/zen-lock/secrets"
        {{- else if and .Values.egress.tls.enabled .Values.egress.tls.zenLockBundle }}
        # zen-lock injection annotations for TLS (mutually exclusive with join)
        zen-lock/inject: {{ .Values.egress.tls.zenLockBundle | quote }}
        zen-lock/mount-path: "/zen-lock/secrets"
        {{- end }}
      labels:
        {{- include "zen-cluster.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: egress
    spec:
      serviceAccountName: {{ include "zen-cluster.fullname" . }}-egress
      securityContext:
        {{- toYaml .Values.egress.podSecurityContext | nindent 8 }}
      containers:
        - name: egress
          image: {{ include "zen-cluster.image" (dict "registry" .Values.global.registry "repo" .Values.egress.image.repository "tag" ( .Values.egress.image.tag | default .Values.global.imageTag ) "digest" .Values.egress.image.digest ) | quote }}
          imagePullPolicy: {{ .Values.egress.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: ZEN_EGRESS_HTTP_ADDR
              value: ":8080"
            - name: ZEN_EGRESS_GRPC_ADDR
              value: ":9090"
            - name: LOG_LEVEL
              value: {{ .Values.egress.logLevel | quote }}
            # P4: Adapter mode — mount adapter secret at SECRET_BASE_PATH (same contract as ingester); agent heartbeat uses CP key
            {{- if .Values.egress.adapterID }}
            - name: ADAPTER_ID
              value: {{ .Values.egress.adapterID | quote }}
            - name: SECRET_BASE_PATH
              value: "/etc/secrets"
            {{- include "zen-cluster.adapterCredentials" (dict "adapterID" .Values.egress.adapterID) | nindent 12 }}
            {{- else if .Values.egress.hmacSecretName }}
            # Legacy: Fallback to old secret format (deprecated)
            - name: HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.egress.hmacSecretName }}
                  key: secret
            {{- end }}
            # H603: Edge state configuration
            - name: ZEN_EDGE_STATE_BACKEND
              value: {{ .Values.egress.state.backend | default "sqlite" | quote }}
            - name: ZEN_EDGE_STATE_PATH
              value: {{ .Values.egress.state.path | default "/var/lib/zen/state.db" | quote }}
            # H505: DLQ storage configuration
            - name: DLQ_STORAGE
              value: "sqlite"
            - name: STATE_PATH
              value: "/var/lib/zen"
            {{- if .Values.egress.state.ttlHours }}
            - name: ZEN_EDGE_STATE_TTL_HOURS
              value: {{ .Values.egress.state.ttlHours | quote }}
            {{- end }}
            {{- if .Values.egress.state.maxSizeMB }}
            - name: ZEN_EDGE_STATE_MAX_MB
              value: {{ .Values.egress.state.maxSizeMB | quote }}
            {{- end }}
            {{- /* Redis configuration (optional - defaults to in-memory if not enabled) */}}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              {{- if .Values.redis.auth.enabled }}
              {{- if .Values.redis.auth.password }}
              value: "redis://:{{ .Values.redis.auth.password }}@{{ .Release.Name }}-redis-master:6379"
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-redis
                  key: redis-password
                  optional: true
              {{- end }}
              {{- else }}
              value: "redis://{{ .Release.Name }}-redis-master:6379"
              {{- end }}
            {{- end }}
            # H603: Additional environment variables from values.yaml
            {{- range .Values.egress.env }}
            - name: {{ .name }}
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            {{- if and .Values.egress.tls.enabled .Values.egress.tls.zenLockBundle }}
            # P130: CP↔EP/DP mTLS: cert paths from zen-lock bundle (SECRETS_STRATEGY)
            - name: EGRESS_GRPC_TLS_ENABLED
              value: "true"
            - name: EGRESS_HTTP_TLS_ENABLED
              value: "true"
            - name: EGRESS_GRPC_TLS_CERT_FILE
              value: /zen-lock/secrets/{{ .Values.egress.tls.certKey | default "tls.crt" }}
            - name: EGRESS_GRPC_TLS_KEY_FILE
              value: /zen-lock/secrets/{{ .Values.egress.tls.keyKey | default "tls.key" }}
            - name: EGRESS_GRPC_TLS_CA_FILE
              value: /zen-lock/secrets/{{ .Values.egress.tls.caKey | default "ca.crt" }}
            - name: EGRESS_HTTP_TLS_CERT_FILE
              value: /zen-lock/secrets/{{ .Values.egress.tls.certKey | default "tls.crt" }}
            - name: EGRESS_HTTP_TLS_KEY_FILE
              value: /zen-lock/secrets/{{ .Values.egress.tls.keyKey | default "tls.key" }}
            - name: EGRESS_HTTP_TLS_CA_FILE
              value: /zen-lock/secrets/{{ .Values.egress.tls.caKey | default "ca.crt" }}
            {{- else if and .Values.egress.tls.enabled .Values.egress.tls.secretName }}
            # P130: CP↔EP/DP mTLS: cert paths from TLS secret mount
            - name: EGRESS_GRPC_TLS_ENABLED
              value: "true"
            - name: EGRESS_HTTP_TLS_ENABLED
              value: "true"
            - name: EGRESS_GRPC_TLS_CERT_FILE
              value: {{ .Values.egress.tls.mountPath }}/{{ .Values.egress.tls.certKey | default "tls.crt" }}
            - name: EGRESS_GRPC_TLS_KEY_FILE
              value: {{ .Values.egress.tls.mountPath }}/{{ .Values.egress.tls.keyKey | default "tls.key" }}
            - name: EGRESS_GRPC_TLS_CA_FILE
              value: {{ .Values.egress.tls.mountPath }}/{{ .Values.egress.tls.caKey | default "ca.crt" }}
            - name: EGRESS_HTTP_TLS_CERT_FILE
              value: {{ .Values.egress.tls.mountPath }}/{{ .Values.egress.tls.certKey | default "tls.crt" }}
            - name: EGRESS_HTTP_TLS_KEY_FILE
              value: {{ .Values.egress.tls.mountPath }}/{{ .Values.egress.tls.keyKey | default "tls.key" }}
            - name: EGRESS_HTTP_TLS_CA_FILE
              value: {{ .Values.egress.tls.mountPath }}/{{ .Values.egress.tls.caKey | default "ca.crt" }}
            {{- end }}
          resources:
            {{- toYaml .Values.egress.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.egress.healthPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.egress.readyPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.egress.securityContext | nindent 12 }}
          volumeMounts:
            - name: edge-state
              mountPath: /var/lib/zen
              readOnly: false
            - name: tmp
              mountPath: /tmp
            {{- if .Values.egress.adapterID }}
            - name: adapter-cred
              mountPath: /etc/secrets
              readOnly: true
            {{- end }}
            {{- if and .Values.egress.tls.enabled .Values.egress.tls.secretName }}
            - name: egress-tls
              mountPath: {{ .Values.egress.tls.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        {{- if eq .Values.egress.persistence.type "pvc" }}
        - name: edge-state
          persistentVolumeClaim:
            claimName: {{ include "zen-cluster.fullname" . }}-egress-state
        {{- else }}
        - name: edge-state
          emptyDir: {}
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.egress.adapterID }}
        - name: adapter-cred
          secret:
            secretName: zen-adapter-cred-{{ .Values.egress.adapterID }}
            optional: true
        {{- end }}
        {{- if and .Values.egress.tls.enabled .Values.egress.tls.secretName }}
        - name: egress-tls
          secret:
            secretName: {{ .Values.egress.tls.secretName }}
        {{- end }}
      terminationGracePeriodSeconds: 30
      {{- with .Values.egress.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.egress.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.egress.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

