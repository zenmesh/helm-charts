{{- if and .Values.ingress.enabled .Values.ingress.webhook.enabled }}
# S201: Canonical webhook endpoint model - path-based webhooks on a single stable host
# Endpoint shape: https://zen.<env>.<dp-domain>/ingest/<tenant-id>/<webhook-id>
# Works with existing ingester /ingest/* catch-all and registry model
# Supports N webhooks per tenant with no DNS churn and no SAN churn
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "zen-cluster.fullname" . }}-ingress-webhook
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "zen-cluster.labels" . | nindent 4 }}
  {{- with .Values.ingress.webhook.annotations }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    {{- toYaml . | nindent 4 }}
  {{- else }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.webhook.tls }}
  tls:
  - hosts:
    - {{ .Values.ingress.webhook.host }}
    {{- if and (eq .Values.webhooks.mode "subdomain") .Values.webhooks.wildcardBase }}
    - {{ .Values.webhooks.wildcardBase }}
    {{- end }}
    secretName: {{ .Values.ingress.webhook.tls.secretName }}
  {{- end }}
  rules:
  - host: {{ .Values.ingress.webhook.host }}
    http:
      paths:
      - path: {{ .Values.ingress.webhook.path | default "/ingest" }}
        pathType: Prefix
        backend:
          service:
            name: {{ include "zen-cluster.fullname" . }}-ingester
            port:
              number: {{ .Values.ingress.webhook.port }}
      - path: /healthz
        pathType: Exact
        backend:
          service:
            name: {{ include "zen-cluster.fullname" . }}-ingester
            port:
              number: {{ .Values.ingester.healthPort }}
      - path: /readyz
        pathType: Exact
        backend:
          service:
            name: {{ include "zen-cluster.fullname" . }}-ingester
            port:
              number: {{ .Values.ingester.healthPort }}
{{- end }}
