{{- if and .Values.egress.enabled .Values.egress.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zen-cluster.fullname" . }}-egress
  labels:
    {{- include "zen-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zen-cluster.fullname" . }}-egress
subjects:
  - kind: ServiceAccount
    name: {{ include "zen-cluster.fullname" . }}-egress
    namespace: {{ .Release.Namespace }}
{{- end }}

