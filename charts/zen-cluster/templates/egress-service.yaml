{{- if .Values.egress.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zen-cluster.fullname" . }}-egress
  labels:
    {{- include "zen-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress
spec:
  type: {{ .Values.egress.service.type }}
  ports:
    - port: {{ .Values.egress.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.egress.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "zen-cluster.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: egress
{{- end }}

