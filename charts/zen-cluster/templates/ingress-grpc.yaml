{{- if and .Values.ingress.enabled .Values.ingester.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "zen-cluster.fullname" . }}-ingress-grpc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "zen-cluster.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.grpc.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
  - hosts:
    - {{ .Values.ingress.grpc.host }}
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
  - host: {{ .Values.ingress.grpc.host }}
    http:
      paths:
      - path: /ingester/healthz
        pathType: Exact
        backend:
          service:
            name: {{ include "zen-cluster.fullname" . }}-ingester
            port:
              number: {{ .Values.ingester.healthPort }}
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "zen-cluster.fullname" . }}-ingester
            port:
              number: {{ .Values.ingester.webhookPort }}
{{- end }}

