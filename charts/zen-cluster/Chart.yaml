apiVersion: v2
name: zen-cluster
description: Zen Cluster-side Components (Ingester and Egress) - Customer-installed components
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - kubernetes
  - observability
  - event-ingestion
  - event-egress
  - cluster-management

home: https://kube-zen.io
sources:
  - https://github.com/leonardoneves/zen

maintainers:
  - name: Kube-Zen Team
    email: team@kube-zen.io

# KEDA dependency for event-driven autoscaling
# KEDA is Apache 2.0 licensed - allows commercial use and distribution
# Will be automatically installed when chart is deployed
dependencies:
  - name: keda
    version: 2.12.0
    repository: https://kedacore.github.io/charts
    condition: keda.enabled
  # Redis dependency for optional nonce tracking and idempotency
  # Redis is optional - defaults to in-memory storage if not enabled
  - name: redis
    version: 20.0.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
