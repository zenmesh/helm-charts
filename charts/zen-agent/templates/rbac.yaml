{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "zen-agent.fullname" . }}
  namespace: {{ include "zen-agent.namespace" . }}
  labels:
    {{- include "zen-agent.labels" . | nindent 4 }}
rules:
  # Read/write access to Secrets in namespace (for storing cluster credentials)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Read access to ConfigMaps (for configuration)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "zen-agent.fullname" . }}
  namespace: {{ include "zen-agent.namespace" . }}
  labels:
    {{- include "zen-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "zen-agent.serviceAccountName" . }}
    namespace: {{ include "zen-agent.namespace" . }}
roleRef:
  kind: Role
  name: {{ include "zen-agent.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}

