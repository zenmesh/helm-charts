{{- if .Values.rbac.create }}
---
# Namespace-scoped Role for zen-agent (secrets, events)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "zen-agent.fullname" . }}
  namespace: {{ include "zen-agent.namespace" . }}
  labels:
    {{- include "zen-agent.labels" . | nindent 4 }}
rules:
  # Read/write access to Secrets in namespace (for storing cluster credentials after bootstrap)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Events for observability
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "zen-agent.fullname" . }}
  namespace: {{ include "zen-agent.namespace" . }}
  labels:
    {{- include "zen-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "zen-agent.serviceAccountName" . }}
    namespace: {{ include "zen-agent.namespace" . }}
roleRef:
  kind: Role
  name: {{ include "zen-agent.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole for adapter controller: list/watch ConfigMaps cluster-wide (ZenAdapter discovery)
# H602: Adapter controller watches ConfigMaps with zen.kubezen.io/adapter=true label
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zen-agent.fullname" . }}-adapter-watcher
  labels:
    {{- include "zen-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zen-agent.fullname" . }}-adapter-watcher
  labels:
    {{- include "zen-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "zen-agent.serviceAccountName" . }}
    namespace: {{ include "zen-agent.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "zen-agent.fullname" . }}-adapter-watcher
  apiGroup: rbac.authorization.k8s.io
{{- end }}

