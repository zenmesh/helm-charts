apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zen-agent.fullname" . }}
  namespace: {{ include "zen-agent.namespace" . }}
  labels:
    {{- include "zen-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "zen-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "zen-agent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "zen-agent.serviceAccountName" . }}
      securityContext:
        {{- with .Values.podSecurityContext }}
        {{- toYaml . | nindent 8 }}
        {{- else }}
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
        {{- end }}
      containers:
        - name: agent
          securityContext:
            {{- with .Values.securityContext }}
            {{- toYaml . | nindent 12 }}
            {{- else }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SAAS_BASE_URL
              value: {{ .Values.saas.endpoint | quote }}
            {{- if .Values.enrollment.bundle }}
            - name: ENROLLMENT_BUNDLE
              value: {{ .Values.enrollment.bundle | quote }}
            {{- else if .Values.enrollment.secretRef.name }}
            - name: ENROLLMENT_BUNDLE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.enrollment.secretRef.name }}
                  key: {{ .Values.enrollment.secretRef.key | default "enrollment_bundle" }}
            {{- end }}
            - name: PORT
              value: {{ .Values.server.port | quote }}
            - name: SECRET_BASE_PATH
              value: {{ .Values.secret.basePath | quote }}
            {{- if .Values.server.shutdownTimeout }}
            - name: SHUTDOWN_TIMEOUT
              value: {{ .Values.server.shutdownTimeout | quote }}
            {{- end }}
            {{- if .Values.tls.caCertFile }}
            - name: TLS_CA_CERT_FILE
              value: {{ .Values.tls.caCertFile | quote }}
            {{- else if .Values.tls.caCertConfigMap.enabled }}
            - name: TLS_CA_CERT_FILE
              value: {{ .Values.tls.caCertConfigMap.mountPath | quote }}
            {{- else if .Values.tls.caCertSecret.enabled }}
            - name: TLS_CA_CERT_FILE
              value: {{ .Values.tls.caCertSecret.mountPath | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or (and .Values.tls .Values.tls.caCertConfigMap .Values.tls.caCertConfigMap.enabled) (and .Values.tls .Values.tls.caCertSecret .Values.tls.caCertSecret.enabled) }}
          volumeMounts:
            {{- if and .Values.tls .Values.tls.caCertConfigMap .Values.tls.caCertConfigMap.enabled }}
            - name: ca-cert
              mountPath: {{ .Values.tls.caCertConfigMap.mountPath }}
              subPath: {{ .Values.tls.caCertConfigMap.key | default "ca.crt" }}
              readOnly: true
            {{- end }}
            {{- if and .Values.tls .Values.tls.caCertSecret .Values.tls.caCertSecret.enabled }}
            - name: ca-cert
              mountPath: {{ .Values.tls.caCertSecret.mountPath }}
              subPath: {{ .Values.tls.caCertSecret.key | default "ca.crt" }}
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or (and .Values.tls .Values.tls.caCertConfigMap .Values.tls.caCertConfigMap.enabled) (and .Values.tls .Values.tls.caCertSecret .Values.tls.caCertSecret.enabled) }}
      volumes:
        {{- if and .Values.tls .Values.tls.caCertConfigMap .Values.tls.caCertConfigMap.enabled }}
        - name: ca-cert
          configMap:
            name: {{ .Values.tls.caCertConfigMap.name }}
        {{- end }}
        {{- if and .Values.tls .Values.tls.caCertSecret .Values.tls.caCertSecret.enabled }}
        - name: ca-cert
          secret:
            secretName: {{ .Values.tls.caCertSecret.name }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

