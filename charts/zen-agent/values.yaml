# Default values for zen-agent
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: kubezen/zen-agent
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  # Automount service account token
  automountServiceAccountToken: true

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8080

# SaaS configuration
saas:
  # SaaS endpoint URL (required)
  # Example: https://api.kube-zen.io
  endpoint: ""
  # Bootstrap token for initial cluster enrollment (required)
  # This is a one-time token used to establish initial trust
  clusterToken: ""

# Tenant and cluster configuration
tenant:
  # Tenant ID (required)
  id: ""

cluster:
  # Cluster ID (required)
  id: ""

# Alternative: bootstrap token can be provided here (takes precedence over saas.clusterToken)
bootstrap:
  token: ""

# Secret configuration
secret:
  # Base path for secrets (default: /etc/secrets)
  basePath: "/etc/secrets"

# Server configuration
server:
  # Port for HTTP server (default: 8080)
  port: 8080
  # Shutdown timeout (default: 30s)
  shutdownTimeout: "30s"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Node selector, tolerations and affinity
nodeSelector: {}

tolerations: []

affinity: {}

# RBAC configuration
rbac:
  # Controls whether RBAC resources are created
  create: true
  # zen-agent needs permissions to manage secrets in its namespace
  # for storing cluster credentials after bootstrap

# TLS Configuration
tls:
  # Custom CA certificate file path (for development/testing with mkcert or custom CAs)
  # If set, the agent will load this CA certificate for TLS verification
  # Example: /etc/ssl/certs/ca-certificates.crt or /usr/local/share/ca-certificates/mkcert-root-ca.pem
  # For production, use proper CA certificates in system certificate store
  caCertFile: ""
  # Mount a ConfigMap containing CA certificate
  caCertConfigMap:
    enabled: false
    name: ""
    key: "ca.crt"
    mountPath: "/etc/ssl/certs/custom-ca.crt"
  # Mount a Secret containing CA certificate
  caCertSecret:
    enabled: false
    name: ""
    key: "ca.crt"
    mountPath: "/etc/ssl/certs/custom-ca.crt"

# Additional environment variables (escape hatch for custom configuration)
# Example:
# extraEnv:
#   - name: CUSTOM_VAR
#     value: "custom-value"
extraEnv: []

