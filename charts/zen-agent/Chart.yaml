apiVersion: v2
name: zen-agent
description: A Helm chart for zen-agent - Kube-ZEN Cluster Agent
type: application
version: 0.1.2
appVersion: "0.1.1"

keywords:
  - kubernetes
  - kube-zen
  - agent
  - cluster
  - saas

home: https://github.com/kube-zen/zen-platform
sources:
  - https://github.com/kube-zen/zen-platform

maintainers:
  - name: Kube-ZEN Team
    email: team@kube-zen.io

annotations:
  category: Management
  artifacthub.io/changes: |
    - ENROLLMENT_BUNDLE env from enrollment.bundle (base64 only; required for install)
    - Kube-ZEN Cluster Agent for SaaS connectivity
    - Bootstrap token support for cluster enrollment
    - Secret management for cluster credentials
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/kube-zen/zen-platform

