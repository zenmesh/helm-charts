{{- include "zen-flow.validateLeaderElection" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zen-flow.fullname" . }}
  namespace: {{ include "zen-flow.namespace" . }}
  labels:
    {{- include "zen-flow.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "zen-flow.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "zen-flow.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "zen-flow.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: controller
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-addr=:{{ .Values.metrics.port }}
            {{- if .Values.webhook.enabled }}
            - --webhook-addr=:{{ .Values.webhook.port }}
            - --webhook-cert-file={{ .Values.webhook.certFile }}
            - --webhook-key-file={{ .Values.webhook.keyFile }}
            - --enable-webhook=true
            {{- else }}
            - --enable-webhook=false
            {{- end }}
            - --leader-election-mode={{ .Values.leaderElection.mode }}
            {{- if .Values.leaderElection.electionID }}
            - --leader-election-id={{ .Values.leaderElection.electionID }}
            {{- end }}
            {{- if eq .Values.leaderElection.mode "zenlead" }}
            - --leader-election-lease-name={{ .Values.leaderElection.leaseName }}
            {{- end }}
            {{- if .Values.controller.maxConcurrentReconciles }}
            - --max-concurrent-reconciles={{ .Values.controller.maxConcurrentReconciles }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            {{- end }}
          {{- if .Values.webhook.enabled }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- else }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REPLICA_COUNT
              value: "{{ .Values.replicaCount }}"
            # Configuration environment variables
            # See values.yaml config section and docs/CONFIGURATION.md for details
            {{- if .Values.config.defaultTTLSeconds }}
            - name: ZEN_FLOW_DEFAULT_TTL_SECONDS
              value: "{{ .Values.config.defaultTTLSeconds }}"
            {{- end }}
            {{- if .Values.config.configMapSizeLimit }}
            - name: ZEN_FLOW_CONFIGMAP_SIZE_LIMIT
              value: "{{ .Values.config.configMapSizeLimit }}"
            {{- end }}
            {{- if .Values.config.uidTruncateLength }}
            - name: ZEN_FLOW_UID_TRUNCATE_LENGTH
              value: "{{ .Values.config.uidTruncateLength }}"
            {{- end }}
            {{- if .Values.config.defaultBackoffLimit }}
            - name: ZEN_FLOW_DEFAULT_BACKOFF_LIMIT
              value: "{{ .Values.config.defaultBackoffLimit }}"
            {{- end }}
            {{- if .Values.config.defaultRetryLimit }}
            - name: ZEN_FLOW_DEFAULT_RETRY_LIMIT
              value: "{{ .Values.config.defaultRetryLimit }}"
            {{- end }}
            {{- if .Values.config.defaultBackoffBase }}
            - name: ZEN_FLOW_DEFAULT_BACKOFF_BASE
              value: "{{ .Values.config.defaultBackoffBase }}"
            {{- end }}
            {{- if .Values.config.defaultBackoffFactor }}
            - name: ZEN_FLOW_DEFAULT_BACKOFF_FACTOR
              value: "{{ .Values.config.defaultBackoffFactor }}"
            {{- end }}
            {{- if .Values.config.defaultDirPerm }}
            - name: ZEN_FLOW_DEFAULT_DIR_PERM
              value: "{{ .Values.config.defaultDirPerm }}"
            {{- end }}
            {{- if .Values.config.defaultFilePerm }}
            - name: ZEN_FLOW_DEFAULT_FILE_PERM
              value: "{{ .Values.config.defaultFilePerm }}"
            {{- end }}
            {{- if .Values.config.defaultConfigMapKey }}
            - name: ZEN_FLOW_DEFAULT_CONFIGMAP_KEY
              value: "{{ .Values.config.defaultConfigMapKey }}"
            {{- end }}
            {{- if .Values.config.defaultContainerName }}
            - name: ZEN_FLOW_DEFAULT_CONTAINER_NAME
              value: "{{ .Values.config.defaultContainerName }}"
            {{- end }}
            {{- if .Values.config.defaultConcurrencyPolicy }}
            - name: ZEN_FLOW_DEFAULT_CONCURRENCY_POLICY
              value: "{{ .Values.config.defaultConcurrencyPolicy }}"
            {{- end }}
            {{- if .Values.config.defaultContentType }}
            - name: ZEN_FLOW_DEFAULT_CONTENT_TYPE
              value: "{{ .Values.config.defaultContentType }}"
            {{- end }}
            {{- if .Values.config.defaultArchiveFormat }}
            - name: ZEN_FLOW_DEFAULT_ARCHIVE_FORMAT
              value: "{{ .Values.config.defaultArchiveFormat }}"
            {{- end }}
            {{- if .Values.config.defaultCompression }}
            - name: ZEN_FLOW_DEFAULT_COMPRESSION
              value: "{{ .Values.config.defaultCompression }}"
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.webhook.enabled }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ .Values.webhook.certSecret }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- else }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

