# Default values for zen-suite
# This is an umbrella chart that installs multiple Kube-Zen components.
# Each component can be enabled/disabled independently.

# Global settings applied to all subcharts
global:
  # Common labels applied to all resources
  commonLabels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: zen-suite

# Enable/disable components
zenLock:
  enabled: true
  # Pass-through values to zen-lock chart
  # See zen-lock/values.yaml for all available options

zenFlow:
  enabled: true
  # Pass-through values to zen-flow chart
  # See zen-flow/values.yaml for all available options

zenGc:
  enabled: true
  # Pass-through values to zen-gc chart
  # See zen-gc/values.yaml for all available options

zenWatcher:
  enabled: true
  # Pass-through values to zen-watcher chart
  # See zen-watcher/values.yaml for all available options

