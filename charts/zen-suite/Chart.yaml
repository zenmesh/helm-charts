apiVersion: v2
name: zen-suite
description: Umbrella chart for Kube-Zen platform components - Complete security and observability suite
type: application
version: 0.0.1-alpha
appVersion: "0.0.1-alpha"

keywords:
  - kubernetes
  - kube-zen
  - security
  - observability
  - workflow
  - operator
  - suite

home: https://github.com/kube-zen/helm-charts
sources:
  - https://github.com/kube-zen/helm-charts

maintainers:
  - name: Kube-ZEN Team
    email: team@kube-zen.io

annotations:
  category: Integration
  artifacthub.io/changes: |
    - Initial release
    - Umbrella chart for zen-lock, zen-flow, zen-gc, and zen-watcher
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/kube-zen/helm-charts/blob/main/docs/INSTALL.md
    - name: Source
      url: https://github.com/kube-zen/helm-charts
    - name: Support
      url: https://github.com/kube-zen/helm-charts/issues

dependencies:
  - name: zen-lock
    version: ">=0.0.1-alpha"
    repository: "@"
    condition: zenLock.enabled
  - name: zen-flow
    version: ">=0.0.1-alpha"
    repository: "@"
    condition: zenFlow.enabled
  - name: zen-gc
    version: ">=0.0.1-alpha"
    repository: "@"
    condition: zenGc.enabled
  - name: zen-watcher
    version: ">=1.0.1"
    repository: "@"
    condition: zenWatcher.enabled

