apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zen-lead.fullname" . }}
  namespace: {{ include "zen-lead.namespace" . }}
  labels:
    {{- include "zen-lead.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "zen-lead.selectorLabels" . | nindent 6 }}
  {{- if .Values.strategy }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  {{- else }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  {{- end }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "zen-lead.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "zen-lead.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- else }}
      terminationGracePeriodSeconds: 30
      {{- end }}
      containers:
        - name: controller
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- $baseTag := .Values.image.tag | default .Chart.AppVersion }}
          {{- $variant := .Values.image.variant | default "ga-only" }}
          {{- if eq $variant "experimental" }}
          {{- if eq $baseTag "latest" }}
          image: "{{ .Values.image.repository }}:latest-experimental"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ $baseTag }}-experimental"
          {{- end }}
          {{- else }}
          {{- if eq $baseTag "latest" }}
          image: "{{ .Values.image.repository }}:latest"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ $baseTag }}-ga-only"
          {{- end }}
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --health-probe-bind-address=:{{ .Values.health.port }}
            {{- if .Values.leaderElectionID }}
            - --leader-election-id={{ .Values.leaderElectionID }}
            {{- else }}
            - --leader-election-id={{ include "zen-lead.fullname" . }}-zen-lead-controller-leader-election
            {{- end }}
            {{- if .Values.leadergroups.enabled }}
            - --enable-leader-groups=true
            {{- end }}
            {{- if .Values.controller.maxCacheSizePerNamespace }}
            - --max-cache-size-per-namespace={{ .Values.controller.maxCacheSizePerNamespace }}
            {{- end }}
            {{- if .Values.controller.maxConcurrentReconciles }}
            - --max-concurrent-reconciles={{ .Values.controller.maxConcurrentReconciles }}
            {{- end }}
            {{- if .Values.controller.cacheUpdateTimeoutSeconds }}
            - --cache-update-timeout-seconds={{ .Values.controller.cacheUpdateTimeoutSeconds }}
            {{- end }}
            {{- if .Values.controller.metricsCollectionTimeoutSeconds }}
            - --metrics-collection-timeout-seconds={{ .Values.controller.metricsCollectionTimeoutSeconds }}
            {{- end }}
            {{- if .Values.controller.qps }}
            - --qps={{ .Values.controller.qps }}
            {{- end }}
            {{- if .Values.controller.burst }}
            - --burst={{ .Values.controller.burst }}
            {{- end }}
            {{- if .Values.controller.fastRetryInitialDelayMs }}
            - --fast-retry-initial-delay-ms={{ .Values.controller.fastRetryInitialDelayMs }}
            {{- end }}
            {{- if .Values.controller.fastRetryMaxDelayMs }}
            - --fast-retry-max-delay-ms={{ .Values.controller.fastRetryMaxDelayMs }}
            {{- end }}
            {{- if .Values.controller.fastRetryMaxAttempts }}
            - --fast-retry-max-attempts={{ .Values.controller.fastRetryMaxAttempts }}
            {{- end }}
            {{- if ne .Values.controller.enableLeaderPodCache nil }}
            - --enable-leader-pod-cache={{ .Values.controller.enableLeaderPodCache }}
            {{- end }}
            {{- if .Values.controller.leaderPodCacheTTLSeconds }}
            - --leader-pod-cache-ttl-seconds={{ .Values.controller.leaderPodCacheTTLSeconds }}
            {{- end }}
            {{- if ne .Values.controller.enableParallelAPICalls nil }}
            - --enable-parallel-api-calls={{ .Values.controller.enableParallelAPICalls }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
          {{- if .Values.startupProbe }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- else }}
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.health.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          {{- end }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if not .Values.rbac.clusterScoped }}
            - name: WATCH_NAMESPACE
              value: {{ include "zen-lead.namespace" . }}
            {{- end }}
            # Experimental Go 1.25 features info
            # Reflects image.variant setting (ga-only default, or experimental)
            # This env var is informational - actual features are compiled into the binary
            {{- $variant := .Values.image.variant | default "ga-only" }}
            {{- if eq $variant "experimental" }}
            - name: GOEXPERIMENT_INFO
              value: "jsonv2,greenteagc"
            {{- else }}
            - name: GOEXPERIMENT_INFO
              value: ""
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.topologySpreadConstraints | nindent 8 }}
      {{- else if gt (int .Values.replicaCount) 1 }}
      # Default: prevent both replicas on same node
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "zen-lead.selectorLabels" . | nindent 14 }}
      {{- end }}

