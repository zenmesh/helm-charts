# Default values for zen-lead
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: kubezen/zen-lead
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.1.0"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Leader election ID (must be unique per controller instance in the same namespace)
# Defaults to release name-based ID if not specified
leaderElectionID: ""  # If empty, defaults to "<release-name>-zen-lead-controller-leader-election"

# LeaderGroup CRD support (Profile C: CRD-driven controller HA)
# Default: false (Profile A only, CRD-free)
# Set to true to enable LeaderGroup CRD and controller HA management
leadergroups:
  enabled: false  # Enable LeaderGroup CRD support (requires CRD installation)

# Controller configuration
controller:
  # Maximum number of cached opted-in Services per namespace
  # The controller maintains an in-memory cache of Services with zen-lead.io/enabled annotation
  # to optimize pod-to-service mapping. This limit prevents unbounded memory growth in large clusters.
  # 
  # When the limit is exceeded, the controller uses LRU (Least Recently Used) eviction:
  # - Oldest accessed Services are evicted first
  # - Cache hit/miss metrics are available for monitoring
  # 
  # Default: 1000 services per namespace
  # Set to 0 for unlimited (not recommended for production)
  # 
  # Tuning guidance:
  # - Small clusters (<100 Services per namespace): Default (1000) is sufficient
  # - Medium clusters (100-1000 Services): Default (1000) works well
  # - Large clusters (>1000 Services per namespace): Increase to 2000-5000
  # - Very large clusters (>5000 Services): Consider namespace sharding or increase to 10000
  # 
  # Monitor these metrics to tune:
  # - zen_lead_cache_size: Current cache size per namespace
  # - zen_lead_cache_hits_total: Cache hit rate
  # - zen_lead_cache_misses_total: Cache miss rate
  # 
  # Cache hit ratio = hits / (hits + misses)
  # Target: >80% hit ratio indicates good cache efficiency
  maxCacheSizePerNamespace: 1000

  # Maximum number of concurrent reconciliations
  # Controls how many Services can be reconciled simultaneously.
  # Higher values increase throughput but consume more resources (CPU, memory, API server load).
  # 
  # Default: 10 concurrent reconciles
  # Set to 0 for unlimited (not recommended for production)
  # 
  # Tuning guidance:
  # - Small clusters (<100 Services): Default (10) is sufficient
  # - Medium clusters (100-1000 Services): 10-20 works well
  # - Large clusters (>1000 Services): 20-50 may be needed
  # - Very large clusters (>5000 Services): Consider 50-100
  # 
  # Monitor these metrics to tune:
  # - zen_lead_reconciliation_duration_seconds: Reconciliation latency
  # - zen_lead_reconciliations_total: Reconciliation rate
  # - API server QPS/Burst limits: Watch for rate limiting
  # 
  # Warning: Too high values can:
  # - Overwhelm the API server (rate limiting)
  # - Cause memory pressure (many goroutines)
  # - Lead to controller starvation (one namespace consuming all capacity)
  maxConcurrentReconciles: 10

# Metrics configuration
metrics:
  enabled: true
  port: 8080

# Health probe configuration
health:
  port: 8081

# Health probes (target health port, not metrics)
livenessProbe:
  httpGet:
    path: /healthz
    port: health  # Port name, not number
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: health  # Port name, not number
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Topology spread constraints (default: prevent both replicas on same node when replicaCount > 1)
topologySpreadConstraints: []

# Pod Disruption Budget (optional, enabled by default when replicaCount > 1)
pdb:
  enabled: true
  minAvailable: 1  # Or use maxUnavailable
  # maxUnavailable: 1

# Namespace configuration
namespace:
  create: false  # Default: use release namespace (no extra namespace creation)
  name: ""  # Default: uses .Release.Namespace

# RBAC scope (cluster-scoped or namespace-scoped)
rbac:
  # If true, creates ClusterRole/ClusterRoleBinding (cluster-scoped)
  # If false, creates Role/RoleBinding (namespace-scoped)
  # Default: false (namespace-scoped for minimal blast radius)
  clusterScoped: false

