name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'
      
      - name: Lint charts
        run: |
          for chart in charts/*/; do
            echo "Linting $(basename $chart)..."
            helm lint "$chart"
          done
  
  validate:
    name: Validate Chart Schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'
      
      - name: Validate schemas
        run: |
          for chart in charts/*/; do
            echo "Validating $(basename $chart)..."
            helm template test "$chart" > /dev/null
          done
  
  test-render:
    name: Test Chart Rendering
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'
      
      - name: Test rendering
        run: |
          for chart in charts/*/; do
            chart_name=$(basename $chart)
            echo "Testing $chart_name..."
            helm template test "$chart" --debug
          done
