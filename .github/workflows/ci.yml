name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: '3.14.0'
      
      - name: Lint charts
        run: |
          # Build dependencies for umbrella charts (zen-suite uses file:// paths)
          if [ -d "charts/zen-suite" ]; then
            echo "Building dependencies for zen-suite..."
            helm dependency build charts/zen-suite || {
              echo "❌ Failed to build dependencies for zen-suite"
              exit 1
            }
          fi
          
          for chart in charts/*/; do
            chart_name=$(basename "$chart")
            echo "Linting $chart_name..."
            # Build dependencies for charts that have external dependencies
            if [[ "$chart_name" == "zen-suite" ]]; then
              helm dependency build "$chart" || {
                echo "❌ Failed to build dependencies for $chart_name"
                exit 1
              }
            fi
            helm lint "$chart"
          done
  
  validate:
    name: Validate Chart Schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: '3.14.0'
      
      - name: Validate schemas
        run: |
          # Build dependencies for umbrella charts (zen-suite uses file:// paths)
          if [ -d "charts/zen-suite" ]; then
            echo "Building dependencies for zen-suite..."
            helm dependency build charts/zen-suite || {
              echo "❌ Failed to build dependencies for zen-suite"
              exit 1
            }
          fi
          
          for chart in charts/*/; do
            chart_name=$(basename "$chart")
            echo "Validating $chart_name..."
            # Build dependencies for charts that have external dependencies
            if [[ "$chart_name" == "zen-suite" ]]; then
              helm dependency build "$chart" || {
                echo "❌ Failed to build dependencies for $chart_name"
                exit 1
              }
            fi
            helm template test "$chart" > /dev/null
          done
  
  test-render:
    name: Test Chart Rendering
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: '3.14.0'
      
      - name: Test rendering
        run: |
          # Build dependencies for umbrella charts (zen-suite uses file:// paths)
          if [ -d "charts/zen-suite" ]; then
            echo "Building dependencies for zen-suite..."
            helm dependency build charts/zen-suite || {
              echo "❌ Failed to build dependencies for zen-suite"
              exit 1
            }
          fi
          
          for chart in charts/*/; do
            chart_name=$(basename "$chart")
            echo "Testing $chart_name..."
            # Build dependencies for charts that have external dependencies
            if [[ "$chart_name" == "zen-suite" ]]; then
              helm dependency build "$chart" || {
                echo "❌ Failed to build dependencies for $chart_name"
                exit 1
              }
            fi
            helm template test "$chart" --debug
          done
