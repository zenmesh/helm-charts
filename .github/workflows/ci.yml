name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'
      
      - name: Lint charts
        run: |
          # Update dependencies for umbrella charts (zen-suite uses file:// paths)
          if [ -d "charts/zen-suite" ]; then
            echo "Updating dependencies for zen-suite..."
            helm dependency update charts/zen-suite > /dev/null 2>&1 || true
          fi
          
          for chart in charts/*/; do
            chart_name=$(basename "$chart")
            echo "Linting $chart_name..."
            helm lint "$chart"
          done
  
  validate:
    name: Validate Chart Schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'
      
      - name: Validate schemas
        run: |
          # Update dependencies for umbrella charts (zen-suite uses file:// paths)
          if [ -d "charts/zen-suite" ]; then
            echo "Updating dependencies for zen-suite..."
            helm dependency update charts/zen-suite > /dev/null 2>&1 || true
          fi
          
          for chart in charts/*/; do
            chart_name=$(basename "$chart")
            echo "Validating $chart_name..."
            helm template test "$chart" > /dev/null
          done
  
  test-render:
    name: Test Chart Rendering
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'
      
      - name: Test rendering
        run: |
          # Update dependencies for umbrella charts (zen-suite uses file:// paths)
          if [ -d "charts/zen-suite" ]; then
            echo "Updating dependencies for zen-suite..."
            helm dependency update charts/zen-suite > /dev/null 2>&1 || true
          fi
          
          for chart in charts/*/; do
            chart_name=$(basename "$chart")
            echo "Testing $chart_name..."
            helm template test "$chart" --debug
          done
