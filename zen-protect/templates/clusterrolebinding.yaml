{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zen-protect.fullname" . }}
  labels:
    {{- include "zen-protect.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zen-protect.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "zen-protect.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
{{- end }}
