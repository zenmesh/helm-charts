{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "zen-protect.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "zen-protect.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
