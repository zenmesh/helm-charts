apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zen-protect.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "zen-protect.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  replicas: {{ .Values.agent.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "zen-protect.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
      labels:
        {{- include "zen-protect.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: {{ include "zen-protect.serviceAccountName" . }}
      containers:
        - name: agent
          image: "{{ .Values.global.registry }}/{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag | default .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: {{ .Values.agent.logLevel | quote }}
            # H601: Required configuration (injected via values, not secrets)
            - name: SAAS_BASE_URL
              value: {{ .Values.agent.saasBaseURL | quote }}
            - name: TENANT_ID
              value: {{ .Values.agent.tenantID | quote }}
            - name: CLUSTER_ID
              value: {{ .Values.agent.clusterID | quote }}
            # H601: Enrollment bundle from Secret or Values
            {{- if .Values.agent.enrollment.enabled }}
            - name: ENROLLMENT_BUNDLE
              {{- if .Values.agent.enrollment.bundle }}
              value: {{ .Values.agent.enrollment.bundle | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agent.enrollment.secretRef.name }}
                  key: {{ .Values.agent.enrollment.secretRef.key }}
              {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.agent.healthPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.agent.readyPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
